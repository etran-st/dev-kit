# ===============================
# RELOAD CONFIG
# ===============================
bind r source-file ~/.tmux.conf \; display-message "Reloaded .tmux.conf"

# ===============================
# PREFIX KEY
# ===============================
# Uncomment if you want C-a instead of default C-b
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix

# ===============================
# SPLIT WINDOWS
# ===============================
unbind %
bind % split-window -h     # Vertical split (side by side)
unbind '"'
bind '"' split-window -v   # Horizontal split (top/bottom)

# ===============================
# MOUSE SUPPORT
# ===============================
# Modern tmux supports a single 'mouse' option
set -g mouse on

# Optional toggle keys for old-style fine control
bind M set -g mouse on \; display-message "Mouse: ON"
bind m set -g mouse off \; display-message "Mouse: OFF"

# ===============================
# TERMINAL SETTINGS
# ===============================
set -g default-terminal "screen-256color"
set -sg escape-time 0       # No command delay

# ===============================
# INDEXING
# ===============================
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ===============================
# MISC
# ===============================
set -g status-keys vi
set -g mode-keys vi

# ===============================
# PANES
# ===============================
set -g pane-active-border-style fg=red
set -g pane-border-style fg=white

# ===============================
# MESSAGES
# ===============================
set -g message-style bg=red,fg=black
set -g message-command-style bg=red,fg=black

# ===============================
# STATUS BAR
# ===============================
set -g status-bg black
set -g status-left '#[fg=black,bg=red] #S '
set -g status-right '#[fg=black,bg=white] %22T | %H:%M '

# ===============================
# WINDOWS
# ===============================
setw -g window-status-format '#[fg=white,bg=black] #I | #W '
setw -g window-status-current-format '#[fg=black,bg=white] #I | #W '